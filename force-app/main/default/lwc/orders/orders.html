<template>
    <template lwc:if={showError}>
        <div class="slds-box slds-theme_error" >
            <h1>Erreur, pas de commandes rattachées à ce compte ou le montant des commandes sont inférieurs à 0.</h1>
        </div>
    </template>
    <!-- Si la valeur de "sumOrdersOfCurrentAccount" est vide ou égale a Zero, je souhaite afficher un message d'erreur -->
    <template lwc:else>
        <div class="slds-box slds-theme_success" >
            <h1>Total des Commandes : {sumOrdersOfCurrentAccount}</h1>
        </div>
    </template>
</template>
